name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday at 08:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. We'll close it in 14 days
            unless there's new activity. If this is still relevant, please leave a
            comment — we read everything.
          stale-pr-message: >
            This PR has been inactive for 30 days. We'll close it in 14 days unless
            there's new activity. If you're still working on it, leave a comment
            and we'll keep it open.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          exempt-issue-labels: 'pinned,needs-verification,help wanted'
          exempt-pr-labels: 'pinned'
